<!DOCTYPE html>
<html lang='id'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <meta name='theme-color' content='#0a0a0a'>
    <meta name='apple-mobile-web-app-capable' content='yes'>
    <link rel='manifest' href='manifest.json'>
    <title>PORTABLE TERMINAL - TSA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap');
        body { background-color: #000; color: #00ff41; font-family: 'Fira Code', monospace; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; border: 1px solid #00ff41; padding: 15px; }
        .header { text-align: center; border-bottom: 2px solid #00ff41; padding-bottom: 10px; margin-bottom: 15px; }
        .nav-bar { display: flex; justify-content: space-around; margin-bottom: 15px; border-bottom: 1px solid #00441b; padding-bottom: 10px; }
        .nav-btn { color: #00ff41; text-decoration: none; font-size: 0.7em; border: 1px solid #00441b; padding: 5px 10px; }
        .nav-btn.active { background: #00ff41; color: #000; }
        .status-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.6em; background: rgba(0, 255, 65, 0.05); padding: 10px; border: 1px solid #00441b; margin-bottom: 15px; }
        .misi-list { min-height: 150px; }
        .misi-card { border: 1px solid #00441b; padding: 10px; margin-bottom: 8px; font-size: 0.75em; display: flex; justify-content: space-between; align-items: center; background: #0a0a0a; }
        .tag { color: #000; background: #00ff41; padding: 2px 5px; font-size: 0.8em; margin-right: 8px; font-weight: bold; }
        .input-panel { border: 1px solid #00ff41; padding: 15px; background: rgba(0, 255, 65, 0.02); margin-top: 20px; }
        input, select, textarea { width: 100%; padding: 10px; background: #000; border: 1px solid #00441b; color: #00ff41; font-family: 'Fira Code', monospace; font-size: 0.8em; margin-bottom: 12px; box-sizing: border-box; }
        .btn-action { display: block; width: 100%; padding: 12px; background: #00ff41; color: #000; text-align: center; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; }
        .footer { text-align: center; font-size: 0.5em; margin-top: 30px; color: #00441b; letter-spacing: 2px; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class='container'>
        <div class='header'>
            <h1>[ PORTABLE_TERMINAL_V1 ]</h1>
            <div style='font-size: 0.6em;'><span class='blink'>></span> AUTHENTICATED_AS_JENDRAL</div>
        </div>

        <div class='nav-bar'>
            <a href='#' class='nav-btn active'>DASHBOARD</a>
            <a href='#' class='nav-btn'>ZONA_BMD</a>
            <a href='#' class='nav-btn'>GUARDIAN</a>
        </div>

        <div class='status-bar'>
            <div>VERSION: <span id='v'>...</span></div>
            <div>LAST_SYNC: <span id='s'>...</span></div>
            <div>SQL_HEARTBEAT: <span style='color: #00ff41;'>OK</span></div>
            <div>USER: JENDRAL</div>
        </div>

        <div style='background: #00ff41; color: #000; padding: 3px 10px; font-weight: bold; font-size: 0.7em; margin-bottom: 10px;'>
            >> LIVE_MONITOR_MISI
        </div>
        <div id='misi-list' class='misi-list'>
            <div style='text-align:center; padding:20px;'>Menghubungkan ke Jantung SQL...</div>
        </div>

        <div class='input-panel'>
            <div style='color: #00ff41; font-size: 0.7em; margin-bottom: 10px; border-left: 3px solid #00ff41; padding-left: 10px;'>
                COMMAND_INPUT (Direct to SQL)
            </div>
            <input type='text' id='task-uraian' placeholder='Uraian Misi...'>
            <select id='task-prio'>
                <option value='P1'>P1 (URGENT)</option>
                <option value='P2'>P2 (NORMAL)</option>
                <option value='Khusus'>KHUSUS</option>
            </select>
            <button class='btn-action' onclick='sendToGate()'>EKSEKUSI_INPUT</button>
        </div>

        <div class='footer'>
            &copy; 2026 TOMMY_SUPERAPPS_ECOSYSTEM | LINKED_VIA_GUDANG_PARKIR
        </div>
    </div>

    <script>
        async function loadStatus() {
            try {
                const res = await fetch('status.json?v=' + Date.now());
                const data = await res.json();
                document.getElementById('v').innerText = data.version;
                document.getElementById('s').innerText = data.last_sync;
                
                const list = document.getElementById('misi-list');
                list.innerHTML = '';
                data.misi.forEach(m => {
                    const card = document.createElement('div');
                    card.className = 'misi-card';
                    card.innerHTML = '<div><span class=\"tag\">' + m.prioritas + '</span>' + m.uraian + '</div>' +
                                     '<div style=\"color:' + (m.status == 1 ? '#00ff41' : '#ff4444') + '\">[' + (m.status == 1 ? 'DONE' : 'PENDING') + ']</div>';
                    list.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }

        function sendToGate() {
            const uraian = document.getElementById('task-uraian').value;
            const prio = document.getElementById('task-prio').value;
            if(!uraian) return alert('Command Kosong!');

            // METODE INTERAKTIF: JALUR GATES TELEGRAM
            // Menggunakan Deep Link untuk mengirim perintah ke Bot Jenifer yang stand-by di SQL Lokal
            const cmd = encodeURIComponent('/Task ' + prio + ' ' + uraian);
            window.location.href = 'tg://msg?text=' + cmd;
            
            document.getElementById('task-uraian').value = '';
            alert('Command Terkirim ke Jalur Telegram Komando!');
        }

        loadStatus();
        setInterval(loadStatus, 30000); // Auto-Sync tiap 30 detik
    </script>
</body>
</html>
