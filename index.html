<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOMMY SUPERAPPS V5 - PORTABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .grid-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .grid-item:active { transform: scale(0.95); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="app()" x-init="init()">

    <!-- 1. LOGIN SCREEN -->
    <template x-if="!isLoggedIn">
        <div class="fixed inset-0 z-[1000] flex items-center justify-center p-6 bg-slate-900">
            <div class="w-full max-w-sm space-y-8 text-center">
                <div class="mx-auto w-24 h-24 bg-sky-600 rounded-3xl flex items-center justify-center shadow-2xl shadow-sky-500/50 mb-8">
                    <i class="fas fa-crown text-4xl text-white"></i>
                </div>
                <h1 class="text-3xl font-black text-white italic tracking-tighter uppercase">Command Center V5</h1>
                <input type="password" x-model="password" @keyup.enter="login()" placeholder="ENTER CODE" class="w-full bg-slate-800 border-0 rounded-2xl p-5 text-center text-xl font-black text-white tracking-[0.5em] focus:ring-4 focus:ring-sky-500">
                <button @click="login()" class="w-full bg-sky-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl shadow-sky-600/30">Authorize</button>
            </div>
        </div>
    </template>

    <!-- 2. MAIN INTERFACE -->
    <div x-show="isLoggedIn" x-cloak class="pb-24">
        
        <!-- HEADER: CLOCK & STATUS -->
        <header class="p-6 sticky top-0 z-50 glass-card mb-4 border-b">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-2xl font-black text-slate-900 leading-none">TOMMY</h2>
                    <p class="text-[9px] font-black text-sky-600 uppercase tracking-widest mt-1">SuperApps Portable</p>
                </div>
                <div class="text-right">
                    <div class="text-xl font-black text-slate-800" x-text="time">00:00:00</div>
                    <div class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter" x-text="dateLabel">Kamis, 7 Mei 2026</div>
                </div>
            </div>
        </header>

        <!-- DASHBOARD GRID -->
        <main class="p-4 space-y-8">
            
            <!-- SECTION 1: CORE COMMAND -->
            <section>
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 ml-2">Main Controls</h3>
                <div class="grid grid-cols-2 gap-4">
                    <!-- MISSION CONTROL -->
                    <div @click="openMenu('mission')" class="grid-item glass-card p-6 rounded-[2rem] flex flex-col items-center justify-center space-y-3 shadow-sm border-b-4 border-sky-500">
                        <i class="fas fa-list-check text-3xl text-sky-600"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest">Missions</span>
                    </div>
                    <!-- GUARDIAN -->
                    <div @click="openMenu('guardian')" class="grid-item glass-card p-6 rounded-[2rem] flex flex-col items-center justify-center space-y-3 shadow-sm border-b-4 border-emerald-500">
                        <i class="fas fa-shield-halved text-3xl text-emerald-600"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest">Guardian</span>
                    </div>
                </div>
            </section>

            <!-- SECTION 2: PRODUCTION -->
            <section>
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 ml-2">Naskah Dinas</h3>
                <div class="grid grid-cols-2 gap-4">
                    <!-- RAPAT -->
                    <div @click="openMenu('rapat')" class="grid-item glass-card p-6 rounded-[2rem] flex flex-col items-center justify-center space-y-3 shadow-sm border-b-4 border-purple-500">
                        <i class="fas fa-file-signature text-3xl text-purple-600"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest">Rapat.Doc</span>
                    </div>
                    <!-- WFH -->
                    <div @click="openMenu('wfh')" class="grid-item glass-card p-6 rounded-[2rem] flex flex-col items-center justify-center space-y-3 shadow-sm border-b-4 border-amber-500">
                        <i class="fas fa-house-laptop text-3xl text-amber-600"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest">WFH Master</span>
                    </div>
                </div>
            </section>

            <!-- SECTION 3: ASSET & LOGISTICS -->
            <section>
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 ml-2">BMD Lifecycle</h3>
                <div class="grid grid-cols-3 gap-3">
                    <div @click="openMenu('bmd_kib')" class="grid-item glass-card py-6 rounded-3xl flex flex-col items-center justify-center space-y-2 border-b-4 border-rose-500">
                        <i class="fas fa-boxes-stacked text-xl text-rose-600"></i>
                        <span class="text-[8px] font-black uppercase">KIB/Ref</span>
                    </div>
                    <div @click="openMenu('bmd_proc')" class="grid-item glass-card py-6 rounded-3xl flex flex-col items-center justify-center space-y-2 border-b-4 border-indigo-500">
                        <i class="fas fa-cart-shopping text-xl text-indigo-600"></i>
                        <span class="text-[8px] font-black uppercase">Pengadaan</span>
                    </div>
                    <div @click="openMenu('bmd_reklas')" class="grid-item glass-card py-6 rounded-3xl flex flex-col items-center justify-center space-y-2 border-b-4 border-cyan-500">
                        <i class="fas fa-shuffle text-xl text-cyan-600"></i>
                        <span class="text-[8px] font-black uppercase">Reklas</span>
                    </div>
                </div>
            </section>

            <!-- SECTION 4: SUPPORT TOOLS -->
            <section>
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 ml-2">Support System</h3>
                <div class="grid grid-cols-3 gap-3">
                    <div @click="openMenu('vault')" class="grid-item glass-card py-6 rounded-3xl flex flex-col items-center justify-center space-y-2 border-b-4 border-slate-700">
                        <i class="fas fa-vault text-xl text-slate-700"></i>
                        <span class="text-[8px] font-black uppercase">Vault</span>
                    </div>
                    <div @click="openMenu('notes')" class="grid-item glass-card py-6 rounded-3xl flex flex-col items-center justify-center space-y-2 border-b-4 border-orange-500">
                        <i class="fas fa-note-sticky text-xl text-orange-600"></i>
                        <span class="text-[8px] font-black uppercase">Notes</span>
                    </div>
                    <div @click="openMenu('personil')" class="grid-item glass-card py-6 rounded-3xl flex flex-col items-center justify-center space-y-2 border-b-4 border-blue-500">
                        <i class="fas fa-users-gear text-xl text-blue-600"></i>
                        <span class="text-[8px] font-black uppercase">Pegawai</span>
                    </div>
                </div>
            </section>

        </main>

        <!-- FOOTER: INFO & VERSION -->
        <footer class="p-8 text-center space-y-2">
            <p class="text-[9px] font-black text-slate-300 uppercase tracking-[0.3em]">Landmark B - Guardian Edition</p>
            <div @click="handleVersionClick()" class="inline-block bg-slate-200 text-slate-500 text-[8px] font-black px-4 py-1.5 rounded-full cursor-pointer active:bg-sky-600 active:text-white transition-colors">
                PR-TSA-B.1.16.000
            </div>
        </footer>

        <!-- NAVIGATION MODAL (DYNAMIC CONTENT) -->
        <div x-show="activeMenu" x-cloak class="fixed inset-0 z-[500] flex flex-col bg-slate-50">
            <header class="p-6 glass-card border-b flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <i :class="menuIcon" class="text-xl text-sky-600"></i>
                    <h2 class="text-sm font-black text-slate-900 uppercase tracking-widest" x-text="menuTitle">Menu</h2>
                </div>
                <button @click="activeMenu = null" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 text-slate-400 hover:text-red-500 transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </header>
            <div class="flex-1 overflow-y-auto p-4" id="menu-content">
                <!-- CONTENT LOADED VIA FETCH OR DEFINED HERE -->
                <div class="p-10 text-center space-y-4">
                    <i class="fas fa-screwdriver-wrench text-4xl text-slate-200"></i>
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest">Feature Reassembling...</p>
                </div>
            </div>
        </div>

        <!-- SHADOW DECK (THE UNDERWORLD) -->
        <div x-show="shadowOpen" x-cloak class="fixed inset-0 z-[900] bg-black p-6 flex flex-col">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-black text-sky-500 italic uppercase">Shadow Deck</h2>
                <button @click="shadowOpen = false" class="text-white text-2xl">&times;</button>
            </div>
            <div class="flex-1 space-y-4 overflow-y-auto">
                <template x-for="task in shadowTasks" :key="task.id">
                    <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
                        <span class="text-white font-bold" x-text="task.task"></span>
                        <i class="fas fa-circle-check text-sky-500"></i>
                    </div>
                </template>
            </div>
        </div>

    </div>

    <script>
        function app() {
            return {
                isLoggedIn: localStorage.getItem('v5_auth') === 'true',
                password: '',
                time: '',
                dateLabel: '',
                activeMenu: null,
                menuTitle: '',
                menuIcon: '',
                shadowOpen: false,
                shadowTasks: [{id:1, task: 'Audit Hidden Cache'}],
                versionClicks: 0,

                init() {
                    this.updateClock();
                    setInterval(() => this.updateClock(), 1000);
                },

                login() {
                    if (this.password === 'tommy77') {
                        this.isLoggedIn = true;
                        localStorage.setItem('v5_auth', 'true');
                    } else {
                        alert('DENIED');
                    }
                },

                updateClock() {
                    const now = new Date();
                    this.time = now.toLocaleTimeString('id-ID');
                    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                    this.dateLabel = now.toLocaleDateString('id-ID', options);
                },

                openMenu(key) {
                    this.activeMenu = key;
                    const meta = {
                        mission: { title: 'Missions', icon: 'fas fa-list-check' },
                        guardian: { title: 'Guardian', icon: 'fas fa-shield-halved' },
                        rapat: { title: 'Rapat.Doc', icon: 'fas fa-file-signature' },
                        wfh: { title: 'WFH Master', icon: 'fas fa-house-laptop' },
                        bmd_kib: { title: 'BMD: KIB', icon: 'fas fa-boxes-stacked' },
                        vault: { title: 'Strategic Vault', icon: 'fas fa-vault' },
                        notes: { title: 'Strategic Notes', icon: 'fas fa-note-sticky' },
                        personil: { title: 'Data Personil', icon: 'fas fa-users-gear' }
                    };
                    this.menuTitle = meta[key].title;
                    this.menuIcon = meta[key].icon;
                },

                handleVersionClick() {
                    this.versionClicks++;
                    if (this.versionClicks >= 3) {
                        this.shadowOpen = true;
                        this.versionClicks = 0;
                    }
                    setTimeout(() => this.versionClicks = 0, 2000);
                }
            }
        }
    </script>
</body>
</html>
